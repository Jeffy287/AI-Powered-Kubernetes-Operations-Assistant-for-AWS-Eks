services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        # Pin or bump: https://github.com/k8sgpt-ai/k8sgpt/releases
        K8SGPT_VERSION: v0.4.32
    container_name: eks-assistant-api
    environment:
      EKS_ASSISTANT_API_PREFIX: /api/v1
      EKS_ASSISTANT_DATA_DIR: /app/data
      # Used when the browser hits the API on a different origin than the SPA
      EKS_ASSISTANT_CORS_ORIGINS: "http://localhost,http://127.0.0.1,http://localhost:8080,http://127.0.0.1:8080,http://localhost:5173,http://127.0.0.1:5173,http://localhost:8000,http://127.0.0.1:8000"
      # Optional: enables K8sGPT `--explain` when provider auth is configured (see k8sgpt auth add)
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # Amazon Bedrock — use inference profile id from Bedrock console (e.g. us.anthropic.claude-sonnet-4-6-...)
      EKS_ASSISTANT_BEDROCK_MODEL_ID: ${EKS_ASSISTANT_BEDROCK_MODEL_ID:-}
      EKS_ASSISTANT_BEDROCK_REGION: ${EKS_ASSISTANT_BEDROCK_REGION:-us-east-1}
      # AWS credentials for boto3 (omit on EC2/ECS/EKS with instance/task role)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
    volumes:
      - eks-assistant-data:/app/data
    ports:
      - "8000:8000"
    # Uncomment to use host kubeconfig (read-only). EKS exec auth often needs AWS CLI + creds on PATH—mount or bake into an extended image.
    # volumes:
    #   - ${HOME}/.kube:/root/.kube:ro

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: eks-assistant-web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  eks-assistant-data:
