# RBAC for EKS Operations Assistant (web UI kubeconfig)
#
# Grants the ServiceAccount used in your uploaded kubeconfig permission to:
#   • Nodes — Compute tab & pod → Node view
#   • Services — Networking tab (cluster-wide list)
#   • Pods / Namespaces / Events — Kubernetes resources explorer
#   • Pod logs — Pods → Logs
#   • DaemonSets — Add-ons tab (kube-system agents)
#
# Apply:
#   kubectl apply -f rbac-eks-operations-assistant.yaml
#
# Verify (replace SA name/namespace if you changed subjects):
#   kubectl auth can-i list nodes --as=system:serviceaccount:default:app-sa
#   kubectl auth can-i list services --as=system:serviceaccount:default:app-sa
#   kubectl auth can-i list pods --as=system:serviceaccount:default:app-sa -A
#   kubectl auth can-i get pods/log --as=system:serviceaccount:default:app-sa -n kube-system
#   kubectl auth can-i list daemonsets --as=system:serviceaccount:default:app-sa -n kube-system
#
# Customize only the `subjects` block if your ServiceAccount is not default/app-sa.
#
# CPU/memory % on Compute needs metrics-server plus metrics.k8s.io read — add separately if needed.
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eks-operations-assistant-extended
  labels:
    app.kubernetes.io/name: eks-operations-assistant
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "pods/status"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["daemonsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eks-operations-assistant-extended
  labels:
    app.kubernetes.io/name: eks-operations-assistant
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: eks-operations-assistant-extended
subjects:
  - kind: ServiceAccount
    name: app-sa
    namespace: default
